services:
  prometheus:
    container_name: prometheus
    image: "${PROMETHEUS_IMAGE}"
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT}:9090"
    volumes:
      - "./generated/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "prometheus_data:/prometheus"

  node-exporter-hq:
    container_name: node-exporter-hq
    image: "${NODE_EXPORTER_IMAGE}"
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--web.listen-address=:${NODE_EXPORTER_PORT}"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|run)($|/)"
    volumes:
      - "/:/host:ro,rslave"

  grafana:
    container_name: grafana
    image: "${GRAFANA_IMAGE}"
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: "${MON_DOMAIN}"
      GF_SERVER_ROOT_URL: "http://${MON_DOMAIN}:${GRAFANA_PORT}/"
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./grafana/dashboards:/var/lib/grafana/dashboards:ro"

volumes:
  prometheus_data:
  grafana_data:
