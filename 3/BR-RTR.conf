enable
configure
crypto-ipsec ike enable
crypto-ipsec profile VPN ike-v2
 mode tunnel
 ike-phase1
  proposal aes256-sha256-modp2048
  auth pre-shared-key P@ssw0rd
 exit
 ike-phase2
  protocol esp
  proposal aes256-sha256
  local-ts 172.16.5.5
  remote-ts 172.16.4.4
 exit
exit
crypto-map VPN-MAP 10
 match peer 172.16.4.4
 set crypto-ipsec profile VPN
exit
filter-map ipv4 VPN-FILTER 5
 match gre host 172.16.5.5 host 172.16.4.4
 set crypto-map VPN-MAP peer 172.16.4.4
exit
no filter-map ipv4 VPN-FILTER 10
filter-map ipv4 VPN-FILTER 10
 match udp host 172.16.4.4 eq 4500 host 172.16.5.5 eq 4500
 set crypto-map VPN-MAP peer 172.16.4.4
exit
filter-map ipv4 VPN-FILTER 15
 match any any any
 set accept
exit
interface int0
 set filter-map in VPN-FILTER 10
exit
interface tunnel.0
 ip address 172.16.0.2/30
 ip mtu 1400
 ip tunnel 172.16.5.5 172.16.4.4 mode gre
 set filter-map in VPN-FILTER 10
exit
router ospf 1
 network 172.16.0.0/30 area 0.0.0.0
exit
end
write memory
